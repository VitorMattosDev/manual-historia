project:
  type: book
  output-dir: _book

lang: pt

book:
  title: "Manual de História"
  subtitle: "Um manual aberto e abrangente — série Manuais de Ciências"
  author: "Série Manuais de Ciências"
  date: today
  date-format: "YYYY"
  language: pt
  search: true
  repo-url: https://github.com/VitorMattosDev/manual-historia
  repo-actions: [edit, issue]
  sidebar:
    style: docked
    collapse-level: 1
  page-footer:
    left: "Manual de História — conteúdo aberto (CC BY-SA)."
    right: "Feito com [Quarto](https://quarto.org)."
  chapters:
    - index.qmd
    - part: "Volume 1 — Introdução aos Estudos Históricos"
      chapters:
        - capitulos/vol01/cap01-o-que-e-historia.qmd
        - capitulos/vol01/cap02-fontes-historicas.qmd
        - capitulos/vol01/cap03-periodizacao.qmd
        - capitulos/vol01/cap04-correntes-historiograficas.qmd
        - capitulos/vol01/cap05-memoria-patrimonio.qmd
        - capitulos/vol01/cap06-historia-e-ciencias.qmd
    - part: "Volume 2 — Pré-História e as Primeiras Sociedades"
