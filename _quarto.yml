bibliography: referencias.bib
csl: referencias-abnt.csl

filters:
  - danmackinlay/tikz
  - quarto

tikz:
  svg-engine: dvisvgm
  cache: true

format:
  html:
    theme: [cosmo, styles.css]
    toc: true
    toc-depth: 3
    toc-title: "Nesta página"
    number-sections: true
    fig-align: center
    code-copy: true
    smooth-scroll: true
    html-math-method: mathjax
  pdf:
    documentclass: scrbook
    papersize: a4
    number-sections: true
    toc: true
    toc-depth: 2
    colorlinks: true
    keep-tex: false
    include-in-header:
      text: |
        \usepackage{amsmath,amssymb}
