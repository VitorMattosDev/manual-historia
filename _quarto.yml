        - capitulos/vol02/cap01-hominizacao.qmd
        - capitulos/vol02/cap02-paleolitico.qmd
        - capitulos/vol02/cap03-revolucao-neolitica.qmd
        - capitulos/vol02/cap04-idade-dos-metais.qmd
        - capitulos/vol02/cap05-pre-historia-brasil-america.qmd
        - capitulos/vol02/cap06-debates-pre-historia.qmd
    - part: "Volume 3 — Antiguidade Oriental"
